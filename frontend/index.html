    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .clinical-gradient {
        background: linear-gradient(135deg, #0f766e 0%, #005c55 100%);
      }
      .surface-glow {
        box-shadow: 0px 12px 32px rgba(15, 23, 42, 0.04);
      }
      body {
        font-family: 'Public Sans', sans-serif;
        background-color: #f7f9fb;
      }
      .pulse-emergency {
        animation: pulse-red 2s infinite;
      }
      @keyframes pulse-red {
        0% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(186, 26, 26, 0); }
        100% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0); }
